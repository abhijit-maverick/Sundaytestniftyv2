<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Maverick Pro — Signal Dashboard</title>
<meta name="viewport" content="width=1440">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #ffffff;
    --surface: #f0f4f8;
    --surface-2: #f8fafc;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --teal: #0891b2;
    --teal-soft: #ecfeff;
    --teal-border: #a5f3fc;
    --green: #059669;
    --green-soft: #ecfdf5;
    --green-border: #a7f3d0;
    --red: #dc2626;
    --red-soft: #fef2f2;
    --red-border: #fecaca;
    --amber: #d97706;
    --amber-soft: #fffbeb;
    --amber-border: #fcd34d;
    --purple: #7c3aed;
    --purple-soft: #f5f3ff;
    --purple-border: #ddd6fe;
    --blue: #2563eb;
    --blue-soft: #eff6ff;
    --blue-border: #bfdbfe;
    --indigo: #4f46e5;
    --indigo-soft: #eef2ff;
    --indigo-border: #c7d2fe;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.04);
    --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.08), 0 2px 6px rgba(15, 23, 42, 0.04);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--surface);
    color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum", "ss01"; }

  /* âââââââââ Header âââââââââ */
  .app-header {
    position: sticky; top: 0; z-index: 30;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
    display: grid; place-items: center;
    color: white; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; letter-spacing: -0.5px;
    box-shadow: 0 1px 2px rgba(8, 145, 178, 0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .brand-name { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
  .brand-sub {
    color: var(--text-muted); font-size: 12px; margin-left: 8px;
    padding-left: 12px; border-left: 1px solid var(--border);
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .date-chip { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 10px; }
  .date-chip .market-clock {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text); font-size: 12px; font-weight: 500;
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 10px;
    background: var(--green-soft); border: 1px solid var(--green-border);
    border-radius: 999px; color: var(--green);
    font-size: 12px; font-weight: 500;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(5,150,105, 0.45); }
    50% { box-shadow: 0 0 0 6px rgba(5,150,105, 0); }
  }

  /* âââââââââ Tab Bar âââââââââ */
  .tab-bar {
    position: sticky; top: 57px; z-index: 25;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; gap: 2px;
    overflow-x: auto;
  }
  .tab {
    background: transparent; border: none;
    padding: 14px 16px 13px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .tab .tab-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    background: var(--surface); color: var(--text-muted);
  }
  .tab.active .tab-count { background: var(--teal-soft); color: var(--teal); }
  .tab.warn .tab-count { background: var(--amber-soft); color: var(--amber); }

  .tab-group-divider {
    width: 1px; height: 20px; background: var(--border);
    margin: 0 8px;
  }

  /* âââââââââ Filter Bar âââââââââ */
  .filter-bar {
    position: sticky; top: 108px; z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .search { flex: 0 0 280px; position: relative; }
  .search input {
    width: 100%; height: 36px;
    padding: 0 12px 0 36px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit; font-size: 13px; color: var(--text);
    outline: none; transition: all 0.15s;
  }
  .search input::placeholder { color: var(--text-dim); }
  .search input:focus {
    background: white; border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
  }
  .search svg {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim);
  }

  .seg {
    display: inline-flex;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px; gap: 2px;
  }
  .seg button {
    background: transparent; border: none;
    padding: 5px 12px;
    font-family: inherit; font-size: 12px; font-weight: 500;
    color: var(--text-muted); border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active {
    background: white; color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .seg button.active.long { color: var(--green); }
  .seg button.active.short { color: var(--red); }
  .seg button.active.tf { color: var(--teal); }

  .seg-label {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-right: 6px;
  }
  .seg-wrap { display: inline-flex; align-items: center; }

  .conf-filter {
    display: flex; align-items: center; gap: 12px;
    margin-left: auto;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px;
  }
  .conf-filter label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .conf-slider {
    -webkit-appearance: none; appearance: none;
    width: 140px; height: 4px;
    background: var(--border); border-radius: 999px;
    outline: none;
  }
  .conf-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px;
    background: white; border: 2px solid var(--teal);
    border-radius: 50%; cursor: pointer;
    box-shadow: 0 1px 3px rgba(8, 145, 178, 0.3);
  }
  .conf-slider::-moz-range-thumb {
    width: 14px; height: 14px;
    background: white; border: 2px solid var(--teal);
    border-radius: 50%; cursor: pointer;
  }
  .conf-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600; color: var(--text);
    min-width: 28px; text-align: right;
  }

  /* âââââââââ Layout âââââââââ */
  .page { max-width: 1280px; margin: 0 auto; padding: 20px 32px 60px; }

  .list-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 4px 4px 12px;
  }
  .list-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .list-title .count { color: var(--text-muted); font-weight: 500; margin-left: 6px; }
  .list-meta {
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse 2s infinite;
  }

  /* âââââââââ Signal Rows âââââââââ */
  .signal-list { display: flex; flex-direction: column; gap: 8px; }
  .signal {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, border-color 0.2s;
    overflow: hidden;
  }
  .signal:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }
  .signal.expanded { border-left: 3px solid var(--teal); box-shadow: var(--shadow-md); }
  .signal.dual { border-left: 3px solid var(--indigo); }
  .signal.dual.expanded { border-left: 3px solid var(--teal); }

  .signal-row {
    display: grid;
    grid-template-columns: 1fr 150px 90px 80px 130px 110px 32px;
    align-items: center; gap: 18px;
    padding: 16px 20px;
    cursor: pointer;
  }
  .signal.expanded .signal-row, .signal.dual .signal-row { padding-left: 18px; }

  .sym-block { min-width: 0; display: flex; align-items: center; gap: 12px; }
  .sym-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    flex-shrink: 0;
  }
  .sym-icon.index {
    background: linear-gradient(135deg, var(--indigo-soft), var(--purple-soft));
    border-color: var(--indigo-border);
    color: var(--indigo);
  }
  .sym-icon.commodity {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border-color: #fcd34d;
    color: #92400e;
  }
  .sym-text { min-width: 0; }
  .sym {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 16px;
    letter-spacing: -0.01em; color: var(--text); line-height: 1.2;
    display: flex; align-items: center; gap: 6px;
  }
  .sym-expiry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 1px 5px; border-radius: 3px;
    background: var(--amber-soft); color: var(--amber);
    border: 1px solid var(--amber-border);
  }
  .co-name {
    font-size: 12px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Strategy badges */
  .badge-stack {
    display: flex; flex-direction: column; gap: 3px;
    align-items: flex-start;
  }
  .badges-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .badge-ema { background: var(--blue-soft); color: var(--blue); border-color: var(--blue-border); }
  .badge-fvg { background: var(--purple-soft); color: var(--purple); border-color: var(--purple-border); }
  .badge-dual {
    background: linear-gradient(90deg, var(--blue-soft), var(--purple-soft));
    color: var(--indigo); border-color: var(--indigo-border);
    font-weight: 700;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .badge-star { width: 10px; height: 10px; }

  .tf-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: var(--text-muted);
    padding: 1px 5px;
    background: var(--surface);
    border-radius: 3px;
    letter-spacing: 0.02em;
  }

  .signal-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  }
  .signal-buy { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-border); }
  .signal-sell { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-border); }

  .ring-wrap { position: relative; width: 52px; height: 52px; display: grid; place-items: center; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { stroke: var(--border); }
  .ring-fg { transition: stroke-dashoffset 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .ring-fg.elite { stroke: var(--indigo); }
  .ring-fg.high { stroke: var(--green); }
  .ring-fg.mid { stroke: var(--amber); }
  .ring-fg.low { stroke: var(--red); }
  .ring-value {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 13px; color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    line-height: 1;
  }
  .ring-value .ring-sub {
    font-size: 7px; font-weight: 500; color: var(--text-dim);
    letter-spacing: 0.05em; margin-top: 1px;
  }
  .ring-value.elite { color: var(--indigo); }

  .price-block { text-align: right; }
  .price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px; font-weight: 700; color: var(--text);
    letter-spacing: -0.02em;
  }
  .price-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
  }
  .price-sub.up { color: var(--green); }
  .price-sub.down { color: var(--red); }

  .spark-wrap { width: 110px; height: 40px; display: grid; place-items: center; }

  .chevron { color: var(--text-dim); transition: transform 0.3s; }
  .signal.expanded .chevron { transform: rotate(180deg); color: var(--teal); }

  /* âââââââââ Expanded Detail âââââââââ */
  .detail { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  .signal.expanded .detail { max-height: 820px; }
  .detail-inner {
    padding: 4px 20px 20px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .detail-section {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .section-title {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: none; letter-spacing: 0;
    color: var(--text-dim); font-weight: 500;
  }

  .targets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .target-card {
    background: white; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px;
  }
  .target-card .tc-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-muted); font-weight: 600;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 5px;
  }
  .tc-dot { width: 6px; height: 6px; border-radius: 50%; }
  .tc-dot.sl { background: var(--red); }
  .tc-dot.t1 { background: var(--amber); }
  .tc-dot.t2 { background: var(--green); }
  .tc-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 700; color: var(--text);
  }
  .tc-meta {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .tc-meta .k { color: var(--text-muted); }
  .tc-meta .v { color: var(--text); font-weight: 600; }
  .tc-meta .v.red { color: var(--red); }
  .tc-meta .v.green { color: var(--green); }

  .breakdown-list { display: flex; flex-direction: column; gap: 10px; }
  .bd-row {
    display: grid; grid-template-columns: 80px 1fr 32px;
    align-items: center; gap: 12px;
  }
  .bd-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .bd-bar {
    height: 6px; background: var(--border);
    border-radius: 999px; overflow: hidden; position: relative;
  }
  .bd-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }
  .bd-fill.high { background: var(--green); }
  .bd-fill.mid { background: var(--amber); }
  .bd-fill.low { background: var(--red); }
  .bd-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600; color: var(--text); text-align: right;
  }

  .calc-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    background: white; border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .calc-cell { padding: 12px; border-right: 1px solid var(--border); }
  .calc-cell:last-child { border-right: none; }
  .calc-k {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-muted); font-weight: 600; margin-bottom: 4px;
  }
  .calc-v {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 700; color: var(--text);
  }
  .calc-v.accent { color: var(--teal); }
  .calc-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
  }

  .equity-chart {
    width: 100%; height: 120px;
    background: white; border: 1px solid var(--border);
    border-radius: 6px; padding: 10px; position: relative;
  }
  .equity-stats {
    display: flex; gap: 16px; margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .equity-stat { display: flex; flex-direction: column; font-size: 11px; color: var(--text-muted); }
  .equity-stat b { font-size: 13px; color: var(--text); margin-top: 2px; }
  .equity-stat b.up { color: var(--green); }

  .empty-hint {
    text-align: center; padding: 48px 20px;
    color: var(--text-muted); font-size: 13px;
    background: white; border: 1px dashed var(--border-strong);
    border-radius: 8px;
  }

  /* âââââââââ Portfolio âââââââââ */
  .portfolio-header {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 16px;
  }
  .pstat {
    background: white; border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .pstat-k {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
  }
  .pstat-v {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700; color: var(--text); margin-top: 4px;
    letter-spacing: -0.01em;
  }
  .pstat-v.up { color: var(--green); }
  .pstat-v.down { color: var(--red); }
  .pstat-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
  }
  .pstat-sub.up { color: var(--green); }
  .pstat-sub.down { color: var(--red); }

  .position {
    background: white; border: 1px solid var(--border);
    border-radius: 8px; box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
    border-left-width: 3px;
  }
  .position:hover { box-shadow: var(--shadow-md); }
  .position.holding { border-left-color: var(--green); }
  .position.warning { border-left-color: var(--amber); }
  .position.exit   { border-left-color: var(--red); }

  .position-row {
    display: grid;
    grid-template-columns: 1fr 110px 120px 120px 80px 140px 110px;
    align-items: center; gap: 16px;
    padding: 14px 18px;
  }
  .pos-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 6px;

/* ── Proxy ── */
async function proxyFetch(url, headers, body) {

    method: 'POST', headers: {'Content-Type':'application/json'},

/* ── Connect ── */
async function handleConnect() {

  const cid   = document.getElementById('c-cid').value.trim();

/* ── Candle Cache (IndexedDB-style via localStorage with size management) ── */
function loadCandleCache() {
  try { const r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : {}; } catch(e) { return {}; }
}
function saveCandleCache(cache) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); return true; } catch(e) {
    console.warn('Cache full, clearing old data');
    localStorage.removeItem(CACHE_KEY); return false;
  }
}

/* ── Fetch candles with incremental update ── */
async function fetchCandlesIncremental(sym, tok, tf) {
  const cache = loadCandleCache();
  const key = sym + '_' + tf;
  const existing = cache[key] || {candles:[], last_ts: null};

  // Determine date range
  const today = new Date();
  const daysNeeded = tf === 'FIFTEEN_MINUTE' ? 15 : 45;
  let fromDate, toDate = today.toISOString().slice(0,10);

  if (existing.last_ts) {
    // Incremental: only fetch since last candle
    const lastDate = new Date(existing.last_ts);
    lastDate.setMinutes(lastDate.getMinutes() + (tf === 'FIFTEEN_MINUTE' ? 15 : 60));
    fromDate = lastDate.toISOString().slice(0,10);
    // If last candle is today, no need to fetch
    if (fromDate > toDate) return existing.candles;
  } else {
    const from = new Date();
    from.setDate(from.getDate() - daysNeeded);
    fromDate = from.toISOString().slice(0,10);
  }

  const data = await fetchHistory(sym, tok, fromDate, toDate, tf);
  if (!data || data.length === 0) return existing.candles;

  // Deduplicate and append
  const existingTs = new Set(existing.candles.map(c => c[0]));
  const newCandles = data.filter(c => !existingTs.has(c[0]));

  const allCandles = [...existing.candles, ...newCandles]
    .sort((a,b) => a[0] < b[0] ? -1 : 1);

  // Keep only last daysNeeded days
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - daysNeeded);
  const filtered = allCandles.filter(c => new Date(c[0]) >= cutoff);

  // Update cache
  const updatedCache = loadCandleCache();
  updatedCache[key] = {
    candles: filtered,
    last_ts: filtered[filtered.length-1]?.[0] || existing.last_ts
  };
  saveCandleCache(updatedCache);

  return filtered;
}

/* ── Signal Detection Engine ── */
function detectSignals(candles, sym, tf) {
  if (!candles || candles.length < 55) return null;

  // Convert to OHLCV objects
  const data = candles.map(c => ({
    t: c[0].slice(0,16), o: c[1], h: c[2], l: c[3], c: c[4], v: c[5]
  }));

  const closes  = data.map(d => d.c);
  const highs   = data.map(d => d.h);
  const lows    = data.map(d => d.l);
  const volumes = data.map(d => d.v);
  const n = data.length;
  const i = n - 1; // latest candle

  // EMAs
  function emaArr(arr, p) {
    const r = new Array(arr.length).fill(null);
    if (arr.length < p) return r;
    r[p-1] = arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
    const k = 2/(p+1);
    for (let j=p; j<arr.length; j++) r[j] = arr[j]*k + r[j-1]*(1-k);
    return r;
  }

  const e20  = emaArr(closes, 20);
  const e50  = emaArr(closes, 50);
  const e200 = emaArr(closes, 200);
  if (!e20[i] || !e50[i]) return null;

  // Average volume
  const avgVol = volumes.slice(Math.max(0,i-20),i).reduce((a,b)=>a+b,0)/Math.min(20,i);

  // RSI
  let rsi = null;
  if (i >= 14) {
    const gains=[], losses=[];
    for(let j=i-14;j<i;j++){const d=closes[j+1]-closes[j];gains.push(d>0?d:0);losses.push(d<0?-d:0);}
    const ag=gains.reduce((a,b)=>a+b,0)/14, al=losses.reduce((a,b)=>a+b,0)/14;
    rsi = al===0 ? 100 : 100-(100/(1+ag/al));
  }

  // Pivot highs/lows
  const sw = 5;
  let lastPH = null, lastPL = null;
  for (let j=sw; j<i-sw; j++) {
    if (highs[j] === Math.max(...highs.slice(j-sw, j+sw+1))) lastPH = {price: highs[j], idx: j};
    if (lows[j]  === Math.min(...lows.slice(j-sw,  j+sw+1))) lastPL = {price: lows[j],  idx: j};
  }

  const signals = [];
  const entry = closes[i];
  const isUptrend  = e20[i] > e50[i] && (e200[i] ? closes[i] > e200[i] : true);
  const isDowntrend= e20[i] < e50[i] && (e200[i] ? closes[i] < e200[i] : true);

  // ── STRATEGY 1: EMA 20 PULLBACK ──
  if (isUptrend && i > 0) {
    const touchedEMA = lows[i] <= e20[i] * 1.003 && highs[i] >= e20[i] * 0.997;
    const bullCandle  = closes[i] > data[i].o;
    const volOk       = volumes[i] > avgVol * 1.1;
    const prevDown    = i > 1 && closes[i-1] < closes[i-2];

    if (touchedEMA && bullCandle && prevDown) {
      const sl   = Math.min(lows[i], e20[i]) * 0.998;
      const risk = entry - sl;
      const t1   = entry + risk * 1.5;
      const t2   = entry + risk * 3.0;
      const conf = calcEMAConf(isUptrend, touchedEMA, volOk, e50[i]>e50[i-1], rsi);
      signals.push({
        strategy: 'EMA 20', dir: 'LONG', entry, sl: round2(sl), t1: round2(t1), t2: round2(t2),
        confidence: conf, riskPct: round2((risk/entry)*100),
        breakdown: {
          trend: isUptrend ? (e200[i]&&closes[i]>e200[i]?95:80) : 30,
          pullback: touchedEMA ? 90 : 40,
          volume: volOk ? 85 : 55,
          structure: e50[i]>e50[i-1] ? 80 : 50
        }
      });
    }
  }

  // Short: EMA 20 rejection in downtrend
  if (isDowntrend && i > 0) {
    const touchedEMA = lows[i] <= e20[i] * 1.003 && highs[i] >= e20[i] * 0.997;
    const bearCandle  = closes[i] < data[i].o;
    const volOk       = volumes[i] > avgVol * 1.1;
    const prevUp      = i > 1 && closes[i-1] > closes[i-2];

    if (touchedEMA && bearCandle && prevUp) {
      const sl   = Math.max(highs[i], e20[i]) * 1.002;
      const risk = sl - entry;
      const t1   = entry - risk * 1.5;
      const t2   = entry - risk * 3.0;
      const conf = calcEMAConf(isDowntrend, touchedEMA, volOk, e50[i]<e50[i-1], rsi);
      signals.push({
        strategy: 'EMA 20', dir: 'SHORT', entry, sl: round2(sl), t1: round2(t1), t2: round2(t2),
        confidence: conf, riskPct: round2((risk/entry)*100),
        breakdown: {
          trend: isDowntrend ? 85 : 30,
          pullback: touchedEMA ? 85 : 40,
          volume: volOk ? 85 : 55,
          structure: e50[i]<e50[i-1] ? 80 : 50
        }
      });
    }
  }

  // ── STRATEGY 2: FVG + BOS ──
  if (lastPH && i >= 2) {
    const bos = closes[i] > lastPH.price && closes[i-1] <= lastPH.price;
    if (bos) {
      for (let j=Math.max(2,i-15); j<i-1; j++) {
        const fvgTop = lows[j+1], fvgBot = highs[j-1];
        if (fvgTop > fvgBot && (fvgTop-fvgBot) > 0.3) {
          const size = fvgTop - fvgBot;
          const e62  = round2(fvgTop - size * 0.62);
          const sl   = round2(fvgBot * 0.999);
          const risk = e62 - sl;
          if (risk > 0) {
            const volOk = volumes[i] > avgVol * 1.2;
            const conf  = calcFVGConf(true, volOk, e50[i]&&closes[i]>e50[i], rsi);
            signals.push({
              strategy: 'FVG+BOS', dir: 'LONG',
              entry: e62, sl, t1: round2(e62+risk*1.5), t2: round2(lastPH.price*1.005),
              confidence: conf, riskPct: round2((risk/e62)*100),
              fvgZone: {top: round2(fvgTop), bot: round2(fvgBot)},
              breakdown: {
                trend: e200[i]&&closes[i]>e200[i] ? 90 : 70,
                pullback: 85,
                volume: volOk ? 90 : 60,
                structure: 88
              }
            });
            break;
          }
        }
      }
    }
  }

  // FVG Bearish BOS
  if (lastPL && i >= 2) {
    const bos = closes[i] < lastPL.price && closes[i-1] >= lastPL.price;
    if (bos) {
      for (let j=Math.max(2,i-15); j<i-1; j++) {
        const fvgBot = highs[j+1], fvgTop = lows[j-1];
        if (fvgBot < fvgTop && (fvgTop-fvgBot) > 0.3) {
          const size = fvgTop - fvgBot;
          const e62  = round2(fvgBot + size * 0.62);
          const sl   = round2(fvgTop * 1.001);
          const risk = sl - e62;
          if (risk > 0) {
            const volOk = volumes[i] > avgVol * 1.2;
            const conf  = calcFVGConf(false, volOk, e50[i]&&closes[i]<e50[i], rsi);
            signals.push({
              strategy: 'FVG+BOS', dir: 'SHORT',
              entry: e62, sl, t1: round2(e62-risk*1.5), t2: round2(lastPL.price*0.995),
              confidence: conf, riskPct: round2((risk/e62)*100),
              breakdown: {
                trend: e200[i]&&closes[i]<e200[i] ? 90 : 70,
                pullback: 85,
                volume: volOk ? 90 : 60,
                structure: 88
              }
            });
            break;
          }
        }
      }
    }
  }

  // ── STRATEGY 3: SMC Order Block + BOS ──
  if (i >= 5) {
    const prevBear  = closes[i-2] < data[i-2].o;
    const strongBull= closes[i] > data[i].o && (closes[i]-data[i].o)/(highs[i]-lows[i]||1) > 0.6;
    const recentH   = Math.max(...highs.slice(Math.max(0,i-8),i));
    const bos       = closes[i] > recentH && closes[i-1] <= recentH;
    const volOk     = volumes[i] > avgVol * 1.3;

    if (prevBear && strongBull && bos && isUptrend) {
      const sl   = round2(lows[i-2] * 0.999);
      const risk = closes[i] - sl;
      if (risk > 0 && risk/closes[i] < 0.03) {
        const conf = calcSMCConf(isUptrend, volOk, e200[i]&&closes[i]>e200[i], rsi, bos);
        signals.push({
          strategy: 'SMC', dir: 'LONG',
          entry: closes[i], sl, t1: round2(closes[i]+risk*1.5), t2: round2(closes[i]+risk*2.5),
          confidence: conf, riskPct: round2((risk/closes[i])*100),
          breakdown: {
            trend: isUptrend ? 88 : 30,
            pullback: bos ? 85 : 50,
            volume: volOk ? 90 : 55,
            structure: prevBear&&strongBull ? 85 : 50
          }
        });
      }
    }

    // SMC Short
    const prevBull  = closes[i-2] > data[i-2].o;
    const strongBear= closes[i] < data[i].o && (data[i].o-closes[i])/(highs[i]-lows[i]||1) > 0.6;
    const recentL   = Math.min(...lows.slice(Math.max(0,i-8),i));
    const bosDown   = closes[i] < recentL && closes[i-1] >= recentL;

    if (prevBull && strongBear && bosDown && isDowntrend) {
      const sl   = round2(highs[i-2] * 1.001);
      const risk = sl - closes[i];
      if (risk > 0 && risk/closes[i] < 0.03) {
        const conf = calcSMCConf(isDowntrend, volOk, e200[i]&&closes[i]<e200[i], rsi, bosDown);
        signals.push({
          strategy: 'SMC', dir: 'SHORT',
          entry: closes[i], sl, t1: round2(closes[i]-risk*1.5), t2: round2(closes[i]-risk*2.5),
          confidence: conf, riskPct: round2((risk/closes[i])*100),
          breakdown: {
            trend: isDowntrend ? 88 : 30,
            pullback: bosDown ? 85 : 50,
            volume: volOk ? 90 : 55,
            structure: prevBull&&strongBear ? 85 : 50
          }
        });
      }
    }
  }

  if (signals.length === 0) return null;

  // Combine signals — dual/triple agreement boost
  const dirs = {LONG:[], SHORT:[]};
  signals.forEach(s => dirs[s.dir].push(s));

  const results = [];
  for (const [dir, sigs] of Object.entries(dirs)) {
    if (sigs.length === 0) continue;
    const dual  = sigs.length >= 2;
    const triple= sigs.length >= 3;
    const baseConf = Math.round(sigs.reduce((a,s)=>a+s.confidence,0)/sigs.length);
    const boosted  = triple ? Math.min(99,baseConf+18) : dual ? Math.min(99,baseConf+12) : baseConf;
    const best     = sigs.sort((a,b)=>b.confidence-a.confidence)[0];
    const strats   = [...new Set(sigs.map(s=>s.strategy))];

    results.push({
      id: sym + '-' + tf + '-' + dir,
      symbol: sym, name: sym, kind: 'stock',
      strategies: strats, dual, triple,
      dir: dir === 'LONG' ? 'LONG' : 'SHORT',
      signal: dir === 'LONG' ? 'BUY' : 'SELL',
      confidence: boosted,
      baseConfidence: baseConf,
      timeframe: tf === 'FIFTEEN_MINUTE' ? '15m' : '1h',
      entry: best.entry, sl: best.sl, t1: best.t1, t2: best.t2,
      riskPct: best.riskPct,
      breakdown: best.breakdown,
      sector: SECTOR_MAP[sym] || 'Other',
      change: round2((closes[i]-closes[i-1])/closes[i-1]*100),
      sparkPoints: closes.slice(-30),
      win: 0.58, seed: sym.charCodeAt(0)*7,
      timeAgo: 'just now',
      isLive: true,
    });
  }
  return results;
}

function calcEMAConf(trend, touch, vol, slope, rsi) {
  let c = 50;
  if (trend) c += 15;
  if (touch) c += 15;
  if (vol)   c += 10;
  if (slope) c += 10;
  if (rsi && rsi < 45) c += 5; // oversold bonus for longs
  return Math.min(95, c);
}
function calcFVGConf(bull, vol, emaOk, rsi) {
  let c = 65;
  if (vol)   c += 15;
  if (emaOk) c += 10;
  if (bull && rsi && rsi < 50) c += 5;
  return Math.min(95, c);
}
function calcSMCConf(trend, vol, ema200ok, rsi, bos) {
  let c = 60;
  if (trend)    c += 12;
  if (vol)      c += 12;
  if (ema200ok) c += 8;
  if (bos)      c += 8;
  return Math.min(95, c);
}
function round2(n) { return Math.round(n*100)/100; }

/* ── Refresh Data ── */
async function refreshData(force = false) {
  if (!jwtToken) return;
  const refreshBtn = document.getElementById('refresh-btn');
  const progressBar = document.getElementById('refresh-progress');
  const progressFill = document.getElementById('refresh-fill');
  const progressLabel = document.getElementById('refresh-label');

  if (refreshBtn) { refreshBtn.classList.add('loading'); refreshBtn.innerHTML = '<span>↻</span> Refreshing...'; }
  if (progressBar) progressBar.className = 'progress-mini show';

  const tfs = ['FIFTEEN_MINUTE', 'ONE_HOUR'];
  const signals = [];
  const total = UNIVERSE.length * tfs.length;
  let done = 0;

  for (const s of UNIVERSE) {
    for (const tf of tfs) {
      if (progressFill) progressFill.style.width = Math.round(done/total*100) + '%';
      if (progressLabel) progressLabel.textContent = s.sym + ' ' + (tf==='FIFTEEN_MINUTE'?'15m':'1H');
      try {
        const candles = await fetchCandlesIncremental(s.sym, s.tok, tf);
        const detected = detectSignals(candles, s.sym, tf);
        if (detected) signals.push(...detected);
      } catch(e) { console.warn(s.sym, tf, e.message); }
      done++;
      await new Promise(r=>setTimeout(r,60));
    }
  }

  liveSignals = signals.filter(s => s.confidence >= 50);
  isDataLive = true;
  lastRefresh = new Date();

  if (refreshBtn) { refreshBtn.classList.remove('loading'); refreshBtn.innerHTML = '<span>↻</span> Refresh'; }
  if (progressBar) progressBar.className = 'progress-mini';
  updateLastRefreshed();

  // Log signals
  logSignals(liveSignals);

  // Re-render React app
  if (window.__reactRoot) window.__reactRoot.render(React.createElement(App));
}

function logSignals(signals) {
  const log = JSON.parse(localStorage.getItem(SIGNAL_LOG_KEY) || '[]');
  const ts  = new Date().toISOString();
  signals.forEach(s => {
    if (!log.find(l => l.id === s.id && l.ts.slice(0,10) === ts.slice(0,10))) {
      log.push({...s, ts});
    }
  });
  // Keep last 500
  localStorage.setItem(SIGNAL_LOG_KEY, JSON.stringify(log.slice(-500)));
}

function updateLastRefreshed() {
  const el = document.getElementById('last-updated');
  if (el && lastRefresh) {
    el.textContent = 'Updated: ' + lastRefresh.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    el.className = 'last-updated';
  }
}

function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(() => {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    // Only refresh during market hours 9:15 to 15:30
    const inMarket = (h > 9 || (h===9 && m>=15)) && (h < 15 || (h===15 && m<=30));
    if (inMarket && jwtToken) refreshData();
  }, 15 * 60 * 1000); // every 15 minutes
}

/* ── CHoCH detection for portfolio positions ── */
function checkPositionHealth(pos, candles) {
  if (!candles || candles.length < 20) return pos.status;
  const closes = candles.map(c => c[4]);
  const highs  = candles.map(c => c[2]);
  const lows   = candles.map(c => c[3]);
  const n = closes.length, i = n-1;

  function emaArr(arr, p) {
    if (arr.length < p) return new Array(arr.length).fill(null);
    const r = new Array(arr.length).fill(null);
    r[p-1] = arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
    const k=2/(p+1);
    for(let j=p;j<arr.length;j++) r[j]=arr[j]*k+r[j-1]*(1-k);
    return r;
  }

  const e20 = emaArr(closes, 20);
  const e50 = emaArr(closes, 50);
  if (!e20[i] || !e50[i]) return pos.status;

  const current = closes[i];

  if (pos.dir === 'LONG') {
    if (current <= pos.sl) return 'exit';
    if (current <= e50[i]) return 'exit';
    if (current <= e20[i] * 0.997) return 'warning';
  } else {
    if (current >= pos.sl) return 'exit';
    if (current >= e50[i]) return 'exit';
    if (current >= e20[i] * 1.003) return 'warning';
  }
  return 'holding';
}

function calcEMA(data, period){
  const k = 2/(period+1);
  const ema = new Array(data.length).fill(null);
  let sum = 0, count = 0;
  for(let i=0;i<data.length;i++){
    if(count < period){ sum += data[i].c; count++; if(count===period) ema[i]=sum/period; }
    else { ema[i] = data[i].c*k + ema[i-1]*(1-k); }
  }
  return ema;
}

/* ── ADX calculator ── */
function calcADX(data, period=14){
  const adx=new Array(data.length).fill(null);
  if(data.length < period*2) return adx;
  const tr=[],pdm=[],ndm=[];
  for(let i=1;i<data.length;i++){
    const h=data[i].h,l=data[i].l,ph=data[i-1].h,pl=data[i-1].l,pc=data[i-1].c;
    tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
    pdm.push(h-ph>pl-l && h-ph>0?h-ph:0);
    ndm.push(pl-l>h-ph && pl-l>0?pl-l:0);
  }
  let atr=tr.slice(0,period).reduce((a,b)=>a+b,0);
  let pDM=pdm.slice(0,period).reduce((a,b)=>a+b,0);
  let nDM=ndm.slice(0,period).reduce((a,b)=>a+b,0);
  const dx=[];
  for(let i=period;i<tr.length;i++){
    atr=atr-atr/period+tr[i]; pDM=pDM-pDM/period+pdm[i]; nDM=nDM-nDM/period+ndm[i];
    const pDI=100*pDM/atr, nDI=100*nDM/atr;
    dx.push(100*Math.abs(pDI-nDI)/(pDI+nDI||1));
  }
  let adxVal=dx.slice(0,period).reduce((a,b)=>a+b,0)/period;
  adx[period*2]=adxVal;
  for(let i=period+1;i<dx.length;i++){ adxVal=(adxVal*(period-1)+dx[i])/period; adx[period+i]=adxVal; }
  return adx;
}

/* ── swing high/low detector ── */
function isUptrend(data, i, ema20, ema50, ema200, adx, mode){
  if(!ema20[i]||!ema50[i]||!ema200[i]) return false;
  const price=data[i].c;
  const aboveEMA20=price>ema20[i], aboveEMA50=price>ema50[i], aboveEMA200=price>ema200[i];
  const emaAligned=ema20[i]>ema50[i] && ema50[i]>ema200[i];
  const adxStrong=!adx[i]||adx[i]>18;
  if(mode==='all') return aboveEMA20&&aboveEMA50&&aboveEMA200&&emaAligned&&adxStrong;
  if(mode==='two') return [aboveEMA20,aboveEMA50,aboveEMA200].filter(Boolean).length>=2&&adxStrong;
  if(mode==='200') return aboveEMA200&&adxStrong;
  return false;
}

/* ── detect CHoCH ── */
function isDowntrend(data, i, ema20, ema50, ema200, adx, mode){
  if(!ema20[i]||!ema50[i]||!ema200[i]) return false;
  const price=data[i].c;
  const belowEMA20=price<ema20[i], belowEMA50=price<ema50[i], belowEMA200=price<ema200[i];
  const emaAligned=ema20[i]<ema50[i] && ema50[i]<ema200[i];
  const adxStrong=!adx[i]||adx[i]>20;
  if(mode==='all') return belowEMA20&&belowEMA50&&belowEMA200&&emaAligned&&adxStrong;
  if(mode==='two') return [belowEMA20,belowEMA50,belowEMA200].filter(Boolean).length>=2&&adxStrong;
  if(mode==='200') return belowEMA200&&adxStrong;
  return false;
}

function findSwings(data, window=3){
  const highs=[], lows=[];
  for(let i=window;i<data.length-window;i++){
    const seg=data.slice(i-window,i+window+1);
    if(data[i].h===Math.max(...seg.map(c=>c.h))) highs.push({idx:i,price:data[i].h,date:data[i].date});
    if(data[i].l===Math.min(...seg.map(c=>c.l))) lows.push({idx:i,price:data[i].l,date:data[i].date});
  }
  return {highs,lows};
}

/* ── detect downtrend ── */
function detectCHoCH(data, entryIdx, swingHighs){
  // CHoCH = price breaks above the most recent lower high after entry
  const recentHighs=swingHighs.filter(h=>h.idx<entryIdx).slice(-3);
  if(!recentHighs.length) return null;
  const lastLH=recentHighs[recentHighs.length-1].price;
  for(let i=entryIdx+1;i<data.length;i++){
    if(data[i].h>lastLH) return {idx:i,date:data[i].date,price:data[i].h};
  }
  return null;
}

async function genTOTP(secret){
  const b32='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  const clean=secret.toUpperCase().replace(/[\s=]/g,'');
  let bits='';
  for(let c of clean){ const i=b32.indexOf(c); if(i>=0) bits+=i.toString(2).padStart(5,'0'); }
  const kb=[]; for(let i=0;i+8<=bits.length;i+=8) kb.push(parseInt(bits.slice(i,i+8),2));
  const T=Math.floor(Date.now()/30000);
  const th=T.toString(16).padStart(16,'0');
  const tb=[]; for(let i=0;i<16;i+=2) tb.push(parseInt(th.slice(i,i+2),16));
  const k=await crypto.subtle.importKey('raw',new Uint8Array(kb),{name:'HMAC',hash:'SHA-1'},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',k,new Uint8Array(tb));
  const h=new Uint8Array(sig); const off=h[19]&0xf;
  const code=((h[off]&0x7f)<<24|h[off+1]<<16|h[off+2]<<8|h[off+3])%1000000;
  return code.toString().padStart(6,'0');
}

function ConfidenceRing({ value, size = 48, stroke = 4, dual = false, tf = null }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - value / 100);
  const tier = tierOf(value, dual);
  return (
    <div className="ring-wrap" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke} className="ring-bg" />
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round" className={`ring-fg ${tier}`} />
      </svg>
      <span className={`ring-value ${dual ? 'elite' : ''}`}>
        {value}
        {tf && <span className="ring-sub">{tf}</span>}
      </span>
    </div>
  );
}

function Sparkline({ points, color, width = 110, height = 40 }) {
  const min = Math.min(...points);
  const max = Math.max(...points);
  const range = max - min || 1;
  const step = width / (points.length - 1);
  const path = points.map((p, i) => {
    const x = i * step;
    const y = height - ((p - min) / range) * (height - 6) - 3;
    return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
  }).join(' ');
  const areaPath = path + ` L ${width} ${height} L 0 ${height} Z`;
  const gradId = `spark-${Math.round(points[0]*100)}-${color.replace('#','')}`;
  return (
    <svg width={width} height={height} style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${gradId})`} />
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={(points.length - 1) * step}
        cy={height - ((points[points.length-1] - min) / range) * (height - 6) - 3}
        r="2.5" fill={color} />
    </svg>
  );
}

function EquityCurve({ points, color }) {
  const W = 360, H = 96;
  const min = Math.min(...points, 0);
  const max = Math.max(...points, 0);
  const range = max - min || 1;
  const step = W / (points.length - 1);
  const toY = (v) => H - ((v - min) / range) * (H - 8) - 4;
  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${(i*step).toFixed(1)} ${toY(p).toFixed(1)}`).join(' ');
  const areaPath = path + ` L ${W} ${H} L 0 ${H} Z`;
  const zeroY = toY(0);
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{display: 'block'}}>
      <defs>
        <linearGradient id="eq-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <line x1="0" y1={zeroY} x2={W} y2={zeroY} stroke="#cbd5e1" strokeWidth="0.5" strokeDasharray="3 3" />
      <path d={areaPath} fill="url(#eq-grad)" />
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
    </svg>
  );
}

// ── Live data injection ──
function getLiveSignals(dir, tf, kind) {
  const signals = window.__liveSignals || [];
  if (signals.length === 0) return null; // fall back to mock
  return signals.filter(s => {
    if (kind === 'stock' && s.kind !== 'stock') return false;
    if (dir && s.dir !== dir) return false;
    if (tf && s.timeframe !== tf) return false;
    return true;
  });
}

function signalToRow(s) {
  // Convert live signal to design format
  return {
    id: s.id,
    symbol: s.symbol,
    name: s.symbol,
    kind: s.kind || 'stock',
    strategies: s.strategies,
    dual: s.dual || s.strategies.length >= 2,
    triple: s.triple || s.strategies.length >= 3,
    dir: s.dir,
    signal: s.signal,
    confidence: s.confidence,
    baseConfidence: s.baseConfidence || s.confidence,
    timeframe: s.timeframe,
    entry: s.entry, sl: s.sl, t1: s.t1, t2: s.t2,
    breakdown: s.breakdown || {trend:70, pullback:70, volume:65, structure:70},
    change: s.change || 0,
    seed: s.seed || 42,
    sparkTrend: s.dir === 'LONG' ? 1 : -1,
    sparkPoints: s.sparkPoints || [],
    win: s.win || 0.55,
    timeAgo: s.timeAgo || 'just now',
    isLive: true,
    sector: s.sector || '',
  };
}

function App() {
  const [tab, setTab] = useState('stocks-long'); // stocks-long | stocks-short | indices | commodities | portfolio
  const [tf, setTf] = useState('15m'); // 15m | 1h
  const [search, setSearch] = useState('');
  const [conf, setConf] = useState(50);
  const [expanded, setExpanded] = useState(null);
  const [clock, setClock] = useState(() => new Date());

  useEffect(() => {
    const id = setInterval(() => setClock(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  // Build signal sets per tab
  const [, forceUpdate] = React.useReducer(x => x+1, 0);
  React.useEffect(() => { window.__forceReactUpdate = forceUpdate; }, []);

  const allStocksLong = useMemo(() => {
    const live = getLiveSignals('LONG', tf==='15m'?'15m':'1h', 'stock');
    if (live && live.length > 0) return live.map(signalToRow);
    return RAW_STOCKS.filter(s => s.dir === 'LONG').map(s => signalFor(s, tf, 'stock'));
  }, [tf, window.__liveSignals]);
  const allStocksShort = useMemo(() => {
    const live = getLiveSignals('SHORT', tf==='15m'?'15m':'1h', 'stock');
    if (live && live.length > 0) return live.map(signalToRow);
    return RAW_STOCKS.filter(s => s.dir === 'SHORT').map(s => signalFor(s, tf, 'stock'));
  }, [tf, window.__liveSignals]);
  const allIndices = useMemo(() => RAW_INDICES.map(s => signalFor(s, tf, 'index')), [tf]);
  const allCommodities = useMemo(() =>
    [...RAW_COMMODITIES]
      .sort((a, b) => a.daysToExpiry - b.daysToExpiry)
      .map(s => signalFor(s, tf, 'commodity')), [tf]);

  const source =
    tab === 'stocks-long'  ? allStocksLong :
    tab === 'stocks-short' ? allStocksShort :
    tab === 'indices'      ? allIndices :
    tab === 'commodities'  ? allCommodities : [];

  const filtered = useMemo(() => {
    return source.filter(s => {
      if (s.confidence < conf) return false;
      if (search.trim()) {
        const q = search.toLowerCase();
        if (!s.symbol.toLowerCase().includes(q) && !s.name.toLowerCase().includes(q)) return false;
      }
      return true;
    }).sort((a, b) => b.confidence - a.confidence);
  }, [source, conf, search]);

  const counts = {
    'stocks-long': RAW_STOCKS.filter(s => s.dir === 'LONG').length,
    'stocks-short': RAW_STOCKS.filter(s => s.dir === 'SHORT').length,
    'indices': RAW_INDICES.length,
    'commodities': RAW_COMMODITIES.length,
    'portfolio': RAW_PORTFOLIO.length,
  };
  const warnCount = RAW_PORTFOLIO.filter(p => p.status === 'warning' || p.status === 'exit').length;

  const dateStr = clock.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  const timeStr = clock.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

  const tabIcon = (kind) => {
    const common = { width: 14, height: 14, viewBox: '0 0 24 24', fill: 'none' };
    if (kind === 'long') return <svg {...common}><path d="M7 17l5-5 3 3 7-7M15 8h6v6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    if (kind === 'short') return <svg {...common}><path d="M7 7l5 5 3-3 7 7M15 16h6v-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    if (kind === 'index') return <svg {...common}><rect x="3" y="3" width="7" height="7" stroke="currentColor" strokeWidth="2" rx="1"/><rect x="14" y="3" width="7" height="7" stroke="currentColor" strokeWidth="2" rx="1"/><rect x="3" y="14" width="7" height="7" stroke="currentColor" strokeWidth="2" rx="1"/><rect x="14" y="14" width="7" height="7" stroke="currentColor" strokeWidth="2" rx="1"/></svg>;
    if (kind === 'commodity') return <svg {...common}><path d="M12 2v20M5 6l7 4 7-4M5 18l7-4 7 4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    if (kind === 'portfolio') return <svg {...common}><path d="M3 7h18v13H3zM8 7V5a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/></svg>;
    return null;
  };

  const iconKind = tab === 'indices' ? 'index' : tab === 'commodities' ? 'commodity' : '';
  const showFilterBar = tab !== 'portfolio';

  return (
    <div>
      {/* Header */}
      <header className="app-header">
        <div className="brand">
          <div className="brand-mark">M</div>
          <div>
            <span className="brand-name">Maverick Pro</span>
            <span className="brand-sub">NSE Signal Dashboard</span>
          </div>
        </div>
        <div className="header-right">
          <div className="date-chip">
            {dateStr}
            <span className="market-clock">{timeStr} IST</span>
          </div>
          <div className="status-pill">
            <span className="status-dot" />
            Connected
          </div>
        </div>
      </header>

      {/* Refresh bar */}
      <div className="refresh-bar">
        <button className="refresh-btn" id="refresh-btn"
          onClick={() => window.refreshData && window.refreshData()}>
          <span>↻</span> Refresh
        </button>
        <div className="progress-mini" id="refresh-progress">
          <div className="progress-mini-fill" id="refresh-fill" style={{width:'0%'}}></div>
        </div>
        <span id="refresh-label" style={{fontSize:11, fontFamily:'JetBrains Mono, monospace', color:'var(--text-muted)'}}></span>
        <span className="last-updated" id="last-updated">No data yet</span>
        <span style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:6, fontSize:11, color:'var(--text-muted)'}}>
          <span className="auto-refresh-dot"></span>
          Auto-refresh every 15min during market hours
        </span>
      </div>

      {/* Tabs */}
      <div className="tab-bar">
        <button className={`tab ${tab === 'stocks-long' ? 'active' : ''}`} onClick={() => setTab('stocks-long')}>
          {tabIcon('long')} Stocks · Long <span className="tab-count">{counts['stocks-long']}</span>
        </button>
        <button className={`tab ${tab === 'stocks-short' ? 'active' : ''}`} onClick={() => setTab('stocks-short')}>
          {tabIcon('short')} Stocks · Short <span className="tab-count">{counts['stocks-short']}</span>
        </button>
        <div className="tab-group-divider" />
        <button className={`tab ${tab === 'indices' ? 'active' : ''}`} onClick={() => setTab('indices')}>
          {tabIcon('index')} Indices <span className="tab-count">{counts['indices']}</span>
        </button>
        <button className={`tab ${tab === 'commodities' ? 'active' : ''}`} onClick={() => setTab('commodities')}>
          {tabIcon('commodity')} Commodities <span className="tab-count">{counts['commodities']}</span>
        </button>
        <div className="tab-group-divider" />
        <button className={`tab ${tab === 'portfolio' ? 'active' : ''} ${warnCount > 0 ? 'warn' : ''}`} onClick={() => setTab('portfolio')}>
          {tabIcon('portfolio')} Portfolio <span className="tab-count">{counts['portfolio']}{warnCount > 0 ? ` · ${warnCount}â ` : ''}</span>
        </button>
      </div>

      {/* Filter bar (hidden on portfolio) */}
      {showFilterBar && (
        <div className="filter-bar">
          <div className="search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="2" />
              <path d="m20 20-3-3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
            </svg>
            <input placeholder="Search symbol or nameâ¦" value={search} onChange={e => setSearch(e.target.value)} />
          </div>

          <div className="seg-wrap">
            <span className="seg-label">Timeframe</span>
            <div className="seg">
              <button className={tf === '15m' ? 'active tf' : ''} onClick={() => setTf('15m')}>15 min</button>
              <button className={tf === '1h' ? 'active tf' : ''} onClick={() => setTf('1h')}>1 hour</button>
            </div>
          </div>

          <div className="conf-filter">
            <label>Min confidence</label>
            <input type="range" min="0" max="100" step="5" value={conf}
              onChange={e => setConf(+e.target.value)} className="conf-slider" />
            <span className="conf-value">{conf}</span>
          </div>
        </div>
      )}

      {/* Page */}
      <div className="page">
        {tab === 'portfolio' ? (
          <Portfolio />
        ) : (
          <>
            <div className="list-header">
              <div className="list-title">
                {tab === 'stocks-long' && 'Long Signals'}
                {tab === 'stocks-short' && 'Short Signals'}
                {tab === 'indices' && 'Index Signals'}
                {tab === 'commodities' && 'Commodity Futures · sorted by nearest expiry'}
                <span className="count">· {filtered.length} of {source.length} · {tf}</span>
              </div>
              <div className="list-meta">
                <span className="refresh-dot" />
                Updated just now · auto-refresh 15s
              </div>
            </div>

            <div className="signal-list">
              {filtered.length === 0 ? (
                <div className="empty-hint">No signals match your filters. Try lowering the confidence threshold or switching timeframe.</div>
              ) : (
                filtered.map(s => (
                  <SignalRow key={s.id} s={s} iconKind={iconKind}
                    expanded={expanded === s.id}
                    onToggle={() => setExpanded(expanded === s.id ? null : s.id)} />
                ))
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
